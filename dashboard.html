<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js" defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #f0f2f5;
    }
    .card {
      background: white; padding: 2rem; border-radius: 12px;
      box-shadow: 0 2px 10px rgba(0,0,0,.1); width: 100%; max-width: 400px; text-align: center;
    }
    h1 { margin-bottom: 1rem; }
    p { color: #666; margin-bottom: 1.5rem; }
    button {
      padding: 0.75rem 2rem; background: #dc2626; color: white;
      border: none; border-radius: 8px; font-size: 1rem; cursor: pointer;
    }
    button:hover { background: #b91c1c; }
    .email { font-weight: 600; color: #2563eb; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Dashboard</h1>
    <p>Logged in as <span class="email" id="user-email">...</span></p>
    <button id="signout-btn">Sign Out</button>
  </div>

  <script>
    getSession().then(({ session }) => {
      if (!session) {
        window.location.href = 'index.html'
        return
      }
      document.getElementById('user-email').textContent = session.user.email
    })

    document.getElementById('signout-btn').addEventListener('click', async () => {
      await signOut()
      window.location.href = 'index.html'
    })
  </script>
</body>
</html>
